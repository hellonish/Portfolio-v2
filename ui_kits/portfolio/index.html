<!-- @dsCard group="Portfolio" viewport="1280x860" name="Portfolio — Full Site" subtitle="Redesigned interactive portfolio · hero → contact" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nishant Sharma — AI Engineer</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--night-800); }
  /* the top nav sits over the hero; whole doc starts on night */
  #app { background: var(--night-900); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--night-900); }
  ::-webkit-scrollbar-thumb { background: var(--night-600); border-radius: 6px; }
  @media (max-width: 860px) {
    section[id], #about > div, .grid { }
    #about [style*="grid-template-columns"], #skills [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
  <div id="root">
    <div id="boot" style="position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; background:var(--night-800); z-index:9999;">
      <span style="width:11px; height:11px; border-radius:50%; background:var(--teal-400); box-shadow:0 0 16px var(--teal-400); animation:bootpulse 1.4s infinite;"></span>
      <span id="boot-msg" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--night-muted);">Compiling the system…</span>
    </div>
  </div>
  <style>@keyframes bootpulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.35;transform:scale(.7);} }</style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel" src="Pet.jsx"></script>
  <script type="text/babel" src="Cursor.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Work.jsx"></script>
  <script type="text/babel" src="Research.jsx"></script>
  <script type="text/babel" src="Skills.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    const { SitePet, CustomCursor, PortfolioNav, PortfolioHero, PortfolioAbout, PortfolioWork, PortfolioResearch, PortfolioSkills, PortfolioContact } = window;

    function App() {
      const [active, setActive] = React.useState('top');

      const nav = (id) => {
        if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
        const el = document.getElementById(id);
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY - 8;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      };

      React.useEffect(() => {
        const ids = ['about', 'work', 'research', 'skills', 'contact'];
        const onScroll = () => {
          const mid = window.scrollY + window.innerHeight * 0.35;
          let cur = 'top';
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el && el.offsetTop <= mid) cur = id;
          }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return (
        <div id="app">
          <CustomCursor />
          <SitePet />
          <PortfolioNav onNav={nav} active={active} />
          <div style={{ marginTop: -64 }}>
            <PortfolioHero onNav={nav} />
          </div>
          <PortfolioAbout />
          <PortfolioWork />
          <PortfolioResearch />
          <PortfolioSkills />
          <PortfolioContact />
        </div>
      );
    }

    // The component bundle (_ds_bundle.js) is regenerated by the compiler
    // between turns. Gate the mount on the namespace being ready so we never
    // crash on a momentarily-missing bundle; re-inject the script if needed.
    const NS = 'NishantSharmaPortfolioDesignSystem_acfe10';
    let tries = 0, reinjected = false;
    (function boot() {
      const ready = window[NS] && window[NS].ParticleField && window.PortfolioHero;
      if (ready) {
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        return;
      }
      tries++;
      if (tries === 10 && !reinjected) {
        reinjected = true;
        const s = document.createElement('script');
        s.src = '../../_ds_bundle.js';
        s.onload = boot;
        document.body.appendChild(s);
      }
      if (tries < 120) {
        setTimeout(boot, 150);
      } else {
        const m = document.getElementById('boot-msg');
        if (m) m.textContent = 'Could not load _ds_bundle.js — it compiles between turns. Reload in a moment.';
      }
    })();
  </script>
</body>
</html>
